<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | MARVEL VAULT</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== Design Tokens (mirrored from styles.css) ===== */
        :root {
            --bg-primary: #030712;
            --bg-secondary: #0a0f1e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --marvel-red: #e23636;
            --marvel-red-bright: #ff4444;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --gradient-text: linear-gradient(90deg, #e23636 0%, #f97316 30%, #a855f7 60%, #3b82f6 100%);
            --border-subtle: rgba(148, 163, 184, 0.1);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated grid background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(226, 54, 54, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 54, 54, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Red glow blob */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(226, 54, 54, 0.08) 0%, transparent 70%);
            z-index: 0;
            animation: glowPulse 5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 700px;
        }

        /* MARVEL VAULT logo link */
        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 3rem;
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--text-primary);
        }

        .logo-accent {
            color: var(--marvel-red);
        }

        /* 404 Heading */
        .error-code {
            font-family: var(--font-display);
            font-size: clamp(7rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: 8px;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shineText 4s linear infinite, fadeSlideUp 0.8s ease-out both;
            filter: drop-shadow(0 0 40px rgba(226, 54, 54, 0.35));
            margin-bottom: 1.5rem;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Status tag */
        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 18px;
            background: rgba(226, 54, 54, 0.1);
            border: 1px solid rgba(226, 54, 54, 0.3);
            border-radius: 100px;
            font-family: var(--font-display);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--marvel-red-bright);
            margin-bottom: 1.5rem;
            animation: fadeSlideUp 0.8s ease-out 0.2s both;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--marvel-red);
            border-radius: 50%;
            animation: dotBlink 2s ease-in-out infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Subtitle */
        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 520px;
            margin: 0 auto 2.5rem;
            animation: fadeSlideUp 0.8s ease-out 0.4s both;
        }

        /* Return button */
        .btn-return {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            background: var(--marvel-red);
            color: #fff;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 100px;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            box-shadow: 0 0 30px rgba(226, 54, 54, 0.3);
            animation: fadeSlideUp 0.8s ease-out 0.6s both;
        }

        .btn-return::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(226, 54, 54, 0.55);
        }

        .btn-return:hover::before {
            transform: translateX(100%);
        }

        .btn-return svg {
            transition: transform 0.3s;
        }

        .btn-return:hover svg {
            transform: translateX(4px);
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <main class="container" role="main">
        <a href="index.html" class="logo-link" aria-label="Return to MarvelVault home">
            <span class="logo-text">MARVEL<span class="logo-accent">VAULT</span></span>
        </a>

        <div class="status-tag">
            <span class="status-dot"></span>
            <span>ERROR 404 — SECTOR NOT FOUND</span>
        </div>

        <h1 class="error-code">404</h1>

        <p class="subtitle">This page has been snapped out of existence.</p>

        <a href="index.html" class="btn-return">
            <span>RETURN TO THE VAULT</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M5 12h14"/>
                <path d="m12 5 7 7-7 7"/>
            </svg>
        </a>
    </main>
</body>
</html>
